<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bool Tok</title>
  <link rel="icon" href="assets/img/booltok_logo.png">


  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">


  <!-- TikTok Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=TikTok+Sans:opsz,wght@12..36,300..900&display=swap"
    rel="stylesheet">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/style.css">

</head>

<body>
  <!-- Container della pagina, necessario per via del layout particolare -->
  <div class="reel-page">
    <video src="assets/video/coder.mp4" muted loop ></video>

    <!-- Header -->
    <header class="reel-header">
      <div class="header-bar">
        <i class="bi bi-play-btn"></i>
        <div class="header-categories">
          <span class="category1"> 
            <p header-text>Esplora</p>
          </span>
          <span class="category2"> 
            <p header-text>Seguiti</p>
          </span>
          <span class="category3"> 
            <p header-text>Per te</p>
          </span>
        </div>
        <i class="bi bi-search"></i>
      </div>
      

    </header>

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sb-follow">
        <i class="bi bi-heart-fill"></i>
        <p class="sb-heart-p"></p>
      </div>
      <div class="sb-heart">
        <i class="bi bi-heart-fill"></i>
        <p class="sb-heart-p"></p>
      </div>
      <div class="sb-comment">
        <i class="bi bi-chat-dots-fill"></i>
        <p class="sb-comment-p"></p>
      </div>
      <div class="sb-save">
        <i class="bi bi-bookmark-fill"></i>
        <p class="sb-save-p"></p>
      </div>
      <div class="sb-share">
        <i class="bi bi-arrow-up-right-square-fill"></i>
        <p class="sb-share-p"></p>
      </div>
    </div>

    <!-- Footer -->
    <footer>

    </footer>
  </div>

</body>

</html>
